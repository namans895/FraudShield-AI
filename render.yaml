services:
  - type: web
    name: fraudshield-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: FRAUDSHIELD_ENV
        value: demo
      - key: FRAUDSHIELD_LOG_LEVEL
        value: INFO

